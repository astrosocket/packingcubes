version: 2

build:
   os: ubuntu-24.04
   tools:
     python: latest
   jobs:
     create_environment:
         - asdf plugin add pixi
         - asdf install pixi latest
         - asdf global pixi latest
     install:
       - pixi install -e docs
     build:
       html:
         - zensical build
     post_build:
       - mkdir -p $READTHEDOCS_OUTPUT/html/
       - cp --recursive site/* $READTHEDOCS_OUTPUT/html/